<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Lista de Compras - Alimentos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>🍽️ Lista de Compras</h1>

        <div class="input-area">
            <input type="text" id="itemInput" placeholder="Digite um item...">
            <button onclick="adicionarItem()">Adicionar</button>
        </div>

        <ul id="lista"></ul>
    </div>

    <script>
        function adicionarItem() {
            const input = document.getElementById("itemInput");
            const texto = input.value;

            if (texto === "") return;

            const li = document.createElement("li");

            const span = document.createElement("span");
            span.textContent = texto;

            // Ícone de comida
            const icon = document.createElement("img");
            icon.classList.add("food-icon");
            
            // Você pode substituir essa URL com o link direto do ícone de comida desejado
            icon.src = "https://image.flaticon.com/icons/png/512/1946/1946429.png";  // Exemplo de ícone de maçã (substitua com o ícone que você quiser)

            // botão de riscar
            const btnCheck = document.createElement("button");
            btnCheck.textContent = "✔";
            btnCheck.onclick = function () {
                span.classList.toggle("riscado");
            };

            // botão de excluir
            const btnDelete = document.createElement("button");
            btnDelete.textContent = "❌";
            btnDelete.onclick = function () {
                li.remove();
            };

            li.appendChild(icon);
            li.appendChild(span);
            li.appendChild(btnCheck);
            li.appendChild(btnDelete);

            document.getElementById("lista").appendChild(li);

            input.value = "";
        }
    </script>
</body>

</html>
